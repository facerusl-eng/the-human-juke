<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Join The Human Jukebox</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at 20% 15%, #dff6ff 0%, transparent 40%),
          radial-gradient(circle at 85% 10%, #ffe6f0 0%, transparent 35%),
          linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
        color: #12203d;
      }

      .card {
        width: min(92vw, 34rem);
        padding: 1.1rem 1rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(18, 32, 61, 0.15);
        box-shadow: 0 16px 42px rgba(16, 35, 72, 0.18);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.15rem;
      }

      p {
        margin: 0.35rem 0;
        font-size: 0.98rem;
      }

      .actions {
        margin-top: 0.9rem;
        display: grid;
        gap: 0.5rem;
      }

      a,
      button {
        appearance: none;
        border: 0;
        border-radius: 0.7rem;
        padding: 0.72rem 0.9rem;
        text-decoration: none;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: #0f4cff;
        color: #fff;
      }

      .secondary {
        background: #e8eeff;
        color: #11306b;
      }

      .hint {
        margin-top: 0.6rem;
        color: #334a7d;
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <main class="card" aria-live="polite">
      <h1>Opening The Human Jukebox</h1>
      <p id="status">Preparing your audience view...</p>
      <div class="actions">
        <a id="openLink" class="primary" href="/audience">Open audience page</a>
        <button id="retry" class="secondary" type="button">Try again in this tab</button>
      </div>
      <p class="hint">If this tab is limited, choose your browser menu and open in Safari/Chrome.</p>
    </main>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var eventId = (params.get('event') || '').trim();
        var target = '/audience' + (eventId ? '?event=' + encodeURIComponent(eventId) : '');

        var link = document.getElementById('openLink');
        var retry = document.getElementById('retry');
        var status = document.getElementById('status');

        if (link) {
          link.href = target;
        }

        if (retry) {
          retry.addEventListener('click', function () {
            window.location.assign(target);
          });
        }

        if (status) {
          status.textContent = 'Opening your live event...';
        }

        window.setTimeout(function () {
          window.location.replace(target);
        }, 250);
      })();
    </script>
  </body>
</html>
